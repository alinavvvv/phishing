{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>Add User</h2>

    <form method="POST" class="card">
        <input type="email" name="email" placeholder="Enter email" required>
        <button type="submit">Add User</button>
    </form>
</div>

<style>
.container { max-width: 500px; margin: auto; padding: 40px; font-family: Arial; }
.card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
input { width: 100%; padding: 12px; margin-bottom: 10px; }
button { background: #2563eb; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; }
</style>
{% endblock %}
