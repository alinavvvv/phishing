<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>SOC Обучителна система</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f3f4f6;">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">🛡 SOC обучение</a>

    <div class="ms-auto d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('dashboard') }}">Табло</a>
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('users') }}">Потребители</a>
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('campaigns') }}">Кампании</a>
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('clicks') }}">Кликове</a>
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('statistics') }}">Статистика</a>
        <a class="btn btn-danger btn-sm" href="{{ url_for('logout') }}">Изход</a>
    </div>
</nav>

<div class="container mt-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert
                    {% if category == 'success' %}alert-success
                    {% elif category == 'error' %}alert-danger
                    {% elif category == 'warning' %}alert-warning
                    {% else %}alert-info
                    {% endif %}
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

</body>
</html>
