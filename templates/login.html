<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

<div class="d-flex justify-content-center align-items-center vh-100">

    <form method="post" class="bg-white p-4 rounded shadow" style="width:320px;">
        <h3 class="text-center mb-3">Admin Login</h3>

        <!-- 🔥 FLASH MESSAGES -->
        {% with messages = get_flashed_messages(with_categories=true, category_filter=["error"]) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-danger text-center p-2">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <input name="username" class="form-control mt-2" placeholder="Username" required>
        <input name="password" type="password" class="form-control mt-2" placeholder="Password" required>

        <button class="btn btn-primary w-100 mt-3">Login</button>
    </form>

</div>

</body>
</html>
