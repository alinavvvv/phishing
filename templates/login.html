<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

<div class="d-flex justify-content-center align-items-center vh-100">

    <form method="post" class="bg-white p-4 rounded shadow" style="width:300px;">
        <h3 class="text-center">Admin Login</h3>

        <input name="username" class="form-control mt-3" placeholder="Username">
        <input name="password" type="password" class="form-control mt-2" placeholder="Password">

        <button class="btn btn-primary w-100 mt-3">Login</button>
    </form>

</div>

</body>
</html>
