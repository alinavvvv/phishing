{% extends "base.html" %}

{% block content %}

<h2>Users</h2>

<a href="{{ url_for('add_user') }}">+ Add User</a>

<table style="margin-top:20px; width:100%; border-collapse:collapse;">
    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Risk Score</th>
        <th>Actions</th>
    </tr>

    {% for u in users %}
    <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.risk_score or 0 }}</td>
        <td>
            <a href="{{ url_for('send', user_id=u.id) }}">Send</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
