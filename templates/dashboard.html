{% extends "base.html" %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: white;
}

.card {
    background: #1e293b;
    border: none;
    border-radius: 16px;
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.title {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 20px;
}

.stat {
    font-size: 32px;
    font-weight: bold;
}

.subtitle {
    color: #94a3b8;
}

.navbar {
    background: #111827;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 25px;
}
</style>

<div class="container mt-4">

    <div class="navbar d-flex justify-content-between align-items-center">
        <h4>🔐 SOC Dashboard</h4>
        <a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm">Logout</a>
    </div>

    <div class="title">Overview</div>

    <div class="row g-4">

        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="subtitle">Total Users</h5>
                <div class="stat">{{ users }}</div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="subtitle">Total Clicks</h5>
                <div class="stat">{{ clicks }}</div>
            </div>
        </div>

    </div>

    <div class="card p-4 mt-4">
        <h5>Quick Actions</h5>

        <a href="{{ url_for('users') }}" class="btn btn-primary mt-2">
            Manage Users
        </a>

        <a href="{{ url_for('add_user') }}" class="btn btn-success mt-2">
            Add User
        </a>

        <a href="{{ url_for('education') }}" class="btn btn-warning mt-2">
            Education Page
        </a>
    </div>

</div>

{% endblock %}
